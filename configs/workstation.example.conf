# speech2text-net workstation example
# Combined client + server setup on the main machine.

MODEL=turbo
LANGUAGE=German
DEVICE=cuda
FP16=1

OUT_DIR=~/.local/share/speech2text-net/output
MODEL_DIR=~/whisper-models
LOG_FILE=~/.local/state/speech2text-net/speech2text-net.log

TITLE_MODEL=
TITLE_MAXLEN=40
AUTO_TITLE=1

ENABLE_MEDIA_MUTE=1
MUTE_ONLY=0
ENABLE_COLOR=1
QUIET=0
ENABLE_CLIPBOARD=1

AUTO_DETECT_LOCAL_SERVER=1
SERVER_HOST=127.0.0.1
SERVER_PORT=8765
SERVER_URL=http://127.0.0.1:8765

API_TOKEN=
API_TOKEN_FILE=~/.config/speech2text-net/.secrets/speech2text-net.token

# GPU cleanup: empty | safe | force
CLEAN_MODE=
GPU_CLEANUP_PATH=~/.local/share/speech2text-net/gpu-cleanup.sh
