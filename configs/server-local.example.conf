# speech2text-net server example
# Localhost-only server for the main workstation.

MODEL=turbo
LANGUAGE=German
DEVICE=cuda
FP16=1

OUT_DIR=~/.local/share/speech2text-net/output
MODEL_DIR=~/whisper-models
LOG_FILE=~/.local/state/speech2text-net/server.log
SERVER_LOG_FILE=~/.local/state/speech2text-net/server.log

TITLE_MODEL=
TITLE_MAXLEN=40
AUTO_TITLE=1

SERVER_HOST=127.0.0.1
SERVER_PORT=8765
SERVER_URL=http://127.0.0.1:8765

API_TOKEN=
API_TOKEN_FILE=~/.config/speech2text-net/.secrets/speech2text-net.token

# GPU cleanup: empty | safe | force
CLEAN_MODE=
GPU_CLEANUP_PATH=~/.local/share/speech2text-net/gpu-cleanup.sh
