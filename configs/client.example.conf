# speech2text-net client example
# Use this on a laptop or secondary Linux device that records locally
# and sends audio to a remote speech2text-net server.

OUT_DIR=~/.local/share/speech2text-net/output
LOG_FILE=~/.local/state/speech2text-net/client.log

ENABLE_CLIPBOARD=1
ENABLE_COLOR=1
QUIET=0

ENABLE_MEDIA_MUTE=1
MUTE_ONLY=0

AUTO_DETECT_LOCAL_SERVER=1
SERVER_URL=http://100.64.0.10:8765

API_TOKEN=
API_TOKEN_FILE=~/.config/speech2text-net/.secrets/speech2text-net.token
